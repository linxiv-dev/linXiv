[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "linxiv"
version = "0.1.0"
description = "Discover, manage, and visualize academic papers from arXiv"
requires-python = ">=3.10"
dependencies = [
    "arxiv",
    "fastapi",
    "google-genai",
    "httpx",
    "markdown",
    "openai",
    "pydantic",
    "python-dotenv",
    "uvicorn[standard]",
]

[project.optional-dependencies]
gui = ["PyQt6", "PyQt6-WebEngine"]
mcp = ["mcp[cli]"]

[project.scripts]
linxiv = "linxiv_cli:main"

# TODO: split into two packages (linxiv core + linxiv-gui) so GUI files are
# excluded from the CLI-only install. Requires restructuring into separate
# pyproject.toml files or a monorepo layout.
# CLI only:   uv tool install ~/Documents/linxiv
# With GUI:   uv tool install "~/Documents/linxiv[gui]"
[tool.hatch.build.targets.wheel]
include = [
    "linxiv_cli.py",
    "linxiv_mcp.py",
    "main_shell.py",
    "pdf.py",
    "search.py",
    "AI_tools.py",
    "api",
    "gui",
    "sources",
    "storage",
]
