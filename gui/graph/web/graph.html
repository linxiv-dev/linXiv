<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="graph.css" />
    <script src="cytoscape.min.js"></script>
    <script src="d3.v7.min.js"></script>
</head>
<body>
    <div id="cy"></div>

    <!-- Both panels share the right-side column -->
    <div id="right-panels">

        <!-- Layout panel -->
        <div class="panel" id="controls">
            <div class="panel-header">
                <span>Layout</span>
                <button class="panel-toggle" data-target="controls-body">▼</button>
            </div>
            <div class="panel-body" id="controls-body">
                <div class="section-title">Forces</div>
                <div class="control-row">
                    <label>Center force</label>
                    <input type="range" id="centerForce" min="0" max="1" step="0.01" value="0.05" />
                    <span class="val" id="centerForceVal">0.05</span>
                </div>
                <div class="control-row">
                    <label>Repel force</label>
                    <input type="range" id="repelForce" min="0" max="1000" step="10" value="180" />
                    <span class="val" id="repelForceVal">180</span>
                </div>
                <div class="control-row">
                    <label>Link distance</label>
                    <input type="range" id="linkDistance" min="10" max="300" step="5" value="70" />
                    <span class="val" id="linkDistanceVal">70</span>
                </div>
                <div class="control-row">
                    <label>Link strength</label>
                    <input type="range" id="linkStrength" min="0" max="1" step="0.01" value="0.3" />
                    <span class="val" id="linkStrengthVal">0.3</span>
                </div>
                <div class="control-row">
                    <button id="relayout-btn" class="full-btn">Randomize &amp; restart</button>
                </div>
            </div>
        </div>

        <!-- Filters panel -->
        <div class="panel" id="filters">
            <div class="panel-header">
                <span>Filters</span>
                <button class="panel-toggle" data-target="filters-body">▼</button>
            </div>
            <div class="panel-body" id="filters-body">

                <div class="section-title">Visibility</div>
                <div class="check-row">
                    <label><input type="checkbox" id="showPapers" checked> Papers</label>
                    <label><input type="checkbox" id="showAuthors" checked> Authors</label>
                    <label><input type="checkbox" id="showTags" checked> Tags</label>
                </div>

                <div class="section-title">Attributes</div>
                <div class="filter-row">
                    <label>Category</label>
                    <input type="text" id="filterCategory" list="categoryList" placeholder="type to filter…">
                    <datalist id="categoryList"></datalist>
                </div>
                <div class="check-row">
                    <label><input type="checkbox" id="filterHasPdf"> Has PDF only</label>
                </div>

                <div class="section-title">Date range</div>
                <div class="filter-row">
                    <label>From</label>
                    <input type="text" id="filterDateFrom" placeholder="YYYY-MM-DD">
                </div>
                <div class="filter-row">
                    <label>To</label>
                    <input type="text" id="filterDateTo" placeholder="YYYY-MM-DD">
                </div>

                <div class="section-title">Highlight</div>
                <div class="filter-row">
                    <label>Title</label>
                    <input type="text" id="filterTitle" placeholder="e.g. transformer">
                </div>
                <div class="filter-row">
                    <label>Author</label>
                    <input type="text" id="filterAuthor" placeholder="e.g. Hinton">
                </div>

                <button id="isolate-btn" class="full-btn toggle-btn">Show highlighted only</button>
            </div>
        </div>

        <!-- Tag Filter panel -->
        <div class="panel" id="tag-filter-panel">
            <div class="panel-header">
                <span>Tag Filter</span>
                <button class="panel-toggle" data-target="tag-filter-body">▼</button>
            </div>
            <div class="panel-body" id="tag-filter-body">

                <div class="section-title">Projects</div>
                <div class="filter-row">
                    <label>Project</label>
                    <input type="text" id="filterProject" list="projectList" placeholder="type to filter…">
                    <datalist id="projectList"></datalist>
                </div>

                <div class="section-title">Project Tags</div>
                <div class="filter-row">
                    <label>Tag</label>
                    <input type="text" id="filterProjectTag" list="projectTagList" placeholder="type to filter…">
                    <datalist id="projectTagList"></datalist>
                </div>

                <div class="section-title">Paper Tags</div>
                <div class="tag-input-row">
                    <input type="text" id="tagFilterInput" list="tagList"
                           placeholder="type a tag…" autocomplete="off">
                    <datalist id="tagList"></datalist>
                    <button id="addTagBtn" title="Add tag">+</button>
                </div>
                <div id="tag-filter-rows"></div>
                <div id="tag-filter-empty" style="font-size:11px; color:#3e3e60; font-style:italic; margin-top:4px;">
                    No tag filters active.
                </div>
            </div>
        </div>

        <!-- Selection panel -->
        <div class="panel" id="selection-panel">
            <div class="panel-header">
                <span>Selection <span id="selectionCount" style="color:#7777aa; font-weight:400;">(0)</span></span>
                <button class="panel-toggle" data-target="selection-body">▼</button>
            </div>
            <div class="panel-body" id="selection-body">
                <div class="check-row" style="margin-bottom:8px;">
                    <span style="font-size:12px; color:#aaaacc;">Click to select · Ctrl+click to add</span>
                </div>
                <button id="select-all-btn" class="full-btn" style="margin-top:0;">Select all visible</button>
                <button id="clear-selection-btn" class="full-btn">Clear selection</button>
            </div>
        </div>

    </div><!-- end #right-panels -->

    <script src="graph.js"></script>
</body>
</html>
